```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMuiz อ่านออกเสียง</title>
    <!-- Load Tailwind CSS for styling and responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Scripts for ResponsiveVoice with different API keys -->
    <!-- API ตัวเดิม (เสียงผู้หญิง) -->
    <script id="voice-female" src="https://code.responsivevoice.org/responsivevoice.js?key=Negu9VLC"></script>
    <!-- API ตัวใหม่ที่ส่งมา (เสียงผู้ชาย) -->
    <script id="voice-male" src="https://code.responsivevoice.org/responsivevoice.js?key=6uRDqcc4"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
            overflow: hidden;
        }
        #statusMessage {
            min-height: 1.5rem;
        }
        #speechText {
            max-height: 45vh;
            overflow-y: auto;
            flex-grow: 1;
        }
        .main-content-area {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 28rem;
        }
        /* Style for active voice selection */
        .voice-option.active {
            border-color: #3b82f6;
            background-color: #1e3a8a;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- Web page header section -->
    <header class="text-center mb-4 mt-4">
        <h1 class="text-5xl font-extrabold text-white mb-2">TheMuiz</h1>
        <h2 class="text-3xl font-semibold text-white">อ่านออกเสียง</h2>
    </header>

    <!-- Main container for the application -->
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full main-content-area">
        <!-- Text input area -->
        <textarea
            id="speechText"
            class="w-full p-4 mb-4 bg-gray-700 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            rows="6"
            placeholder="พิมพ์ข้อความที่นี่เลยค่ะ..."
        ></textarea>

        <!-- Voice Selection Area -->
        <div class="w-full mb-6">
            <p class="text-sm text-gray-400 mb-2 text-center">เลือกเสียงที่ต้องการ:</p>
            <div class="flex space-x-2">
                <button 
                    id="selectFemale" 
                    class="voice-option active flex-1 py-2 px-4 rounded-lg border border-gray-600 bg-gray-700 text-sm transition-all duration-200"
                >
                    👩 เสียงผู้หญิง
                </button>
                <button 
                    id="selectMale" 
                    class="voice-option flex-1 py-2 px-4 rounded-lg border border-gray-600 bg-gray-700 text-sm transition-all duration-200"
                >
                    👨 เสียงผู้ชาย
                </button>
            </div>
        </div>

        <!-- Status message display area -->
        <p id="statusMessage" class="text-center text-gray-400 mb-6 text-sm"></p>

        <!-- Buttons for actions -->
        <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 w-full">
            <button
                id="speakButton"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
                อ่านออกเสียงเลย!
            </button>
            <button
                id="clearButton"
                class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500"
            >
                ล้างข้อความ
            </button>
        </div>
    </div>

    <!-- Creator credit footer -->
    <footer class="mt-4 mb-4 text-gray-500 text-sm">
        Creator: TheMuiz × หนูมะลิ
    </footer>

    <script>
        // ฟังก์ชันสำหรับกรองอักขระ
        function filterTextToSpeak(text) {
            return text.replace(/[^ก-๙a-zA-Z0-9\s\n]/g, '');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const speechText = document.getElementById('speechText');
            const speakButton = document.getElementById('speakButton');
            const clearButton = document.getElementById('clearButton');
            const statusMessage = document.getElementById('statusMessage');
            
            // Voice selection elements
            const btnFemale = document.getElementById('selectFemale');
            const btnMale = document.getElementById('selectMale');
            
            let selectedVoice = 'Thai Female'; // Default เป็นเสียงผู้หญิง

            // จัดการการเลือกเสียง
            btnFemale.addEventListener('click', () => {
                selectedVoice = 'Thai Female';
                btnFemale.classList.add('active');
                btnMale.classList.remove('active');
                statusMessage.textContent = 'เลือกโหมดเสียงผู้หญิงแล้วค่ะ';
            });

            btnMale.addEventListener('click', () => {
                selectedVoice = 'Thai Male';
                btnMale.classList.add('active');
                btnFemale.classList.remove('active');
                statusMessage.textContent = 'เลือกโหมดเสียงผู้ชายแล้วค่ะ';
            });

            speechText.value = "";

            speakButton.addEventListener('click', () => {
                if (typeof responsiveVoice === 'undefined') {
                    statusMessage.textContent = 'ระบบเสียงยังไม่พร้อมใช้งาน กรุณาลองใหม่ในอีกสักครู่ค่ะ';
                    return;
                }

                const textToSpeak = speechText.value.trim();

                if (textToSpeak === '') {
                    statusMessage.textContent = 'กรุณาพิมพ์ข้อความที่ต้องการให้อ่านก่อนนะคะ!';
                    return;
                }

                const filteredText = filterTextToSpeak(textToSpeak);

                if (filteredText === '') {
                    statusMessage.textContent = 'ไม่มีเนื้อหาที่เป็นตัวหนังสือให้อ่านออกเสียงค่ะ!';
                    return;
                }

                statusMessage.textContent = `กำลังอ่านด้วย${selectedVoice === 'Thai Female' ? 'เสียงผู้หญิง' : 'เสียงผู้ชาย'}...`;

                // เรียกใช้งาน API ตามเสียงที่เลือก
                responsiveVoice.speak(filteredText, selectedVoice, {
                    onend: () => {
                        statusMessage.textContent = 'อ่านจบแล้วค่ะ!';
                    },
                    onerror: (e) => {
                        statusMessage.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
                        console.error('ResponsiveVoice error:', e);
                    }
                });
            });

            clearButton.addEventListener('click', () => {
                if (typeof responsiveVoice !== 'undefined') {
                    responsiveVoice.cancel();
                }
                speechText.value = '';
                statusMessage.textContent = 'ข้อความถูกล้างแล้วค่ะ!';
            });
        });
    </script>
</body>
</html>

```

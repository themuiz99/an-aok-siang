<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TheMuiz ไฮไลท์เสียงอ่าน Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=Negu9VLC"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-card {
            background: #0f172a;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* สไตล์สำหรับการไฮไลท์ */
        .word {
            display: inline-block;
            transition: all 0.2s ease;
            margin-right: 4px;
            color: #64748b; /* สีคำที่ยังไม่อ่าน (จางๆ) */
        }

        .word.active {
            color: #ffffff;
            background-color: rgba(59, 130, 246, 0.4);
            border-radius: 4px;
            transform: scale(1.1);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .word.passed {
            color: #334155; /* สีคำที่อ่านผ่านไปแล้ว */
        }

        /* ปรับแต่ง Scrollbar ของช่องแสดงไฮไลท์ */
        #displayArea::-webkit-scrollbar {
            width: 4px;
        }
        #displayArea::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #0f172a;
        }
    </style>
</head>
<body class="text-slate-300 p-4">

    <!-- ส่วนหัว -->
    <header class="text-center py-3 shrink-0">
        <h1 class="text-3xl font-extrabold tracking-tight text-white">TheMuiz</h1>
        <p class="text-[10px] text-blue-400 font-medium tracking-[0.2em] uppercase">ระบบอ่านออกเสียงพร้อมไฮไลท์</p>
    </header>

    <!-- พื้นที่หลัก -->
    <main class="flex-grow flex flex-col gap-4 max-w-md mx-auto w-full overflow-hidden">
        
        <!-- ส่วนแสดงผลการอ่าน (ไฮไลท์) และการพิมพ์ -->
        <div class="flex-grow flex flex-col min-h-0 relative">
            <!-- โหมดแก้ไขข้อความ -->
            <textarea
                id="speechText"
                class="w-full flex-grow p-6 rounded-[1.5rem] bg-slate-900/50 border border-slate-800 text-slate-100 outline-none focus:border-blue-500/30 transition-all text-lg leading-relaxed resize-none shadow-inner"
                placeholder="พิมพ์ข้อความที่นี่เพื่อเริ่มอ่าน..."
            ></textarea>
            
            <!-- โหมดไฮไลท์ (จะแสดงตอนเริ่มอ่าน) -->
            <div id="displayArea" class="hidden absolute inset-0 w-full h-full p-6 rounded-[1.5rem] bg-slate-900 border border-blue-500/30 text-lg leading-relaxed overflow-y-auto z-10">
                <!-- คำต่างๆ จะถูกใส่เข้ามาที่นี่ด้วย JavaScript -->
            </div>

            <!-- ปุ่มสลับโหมดมุมขวาบน -->
            <div id="modeLabel" class="absolute top-3 right-4 text-[9px] text-slate-600 uppercase font-bold tracking-widest">โหมดพิมพ์</div>
        </div>

        <!-- แผงควบคุม -->
        <div class="main-card p-5 space-y-5 shrink-0">
            
            <!-- ปรับความเร็ว -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-[11px] font-bold uppercase tracking-wider">
                    <span class="text-slate-500">ความเร็วในการอ่าน</span>
                    <span id="speedValue" class="text-blue-400">1.0x</span>
                </div>
                <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="1">
            </div>

            <!-- สถานะ -->
            <div id="statusMessage" class="text-center text-[11px] font-medium text-slate-600 h-3 italic">
                เตงพร้อมแล้วกดเริ่มได้เลยนะจ๊ะ
            </div>

            <!-- ชุดคำสั่งหลัก -->
            <div class="flex flex-col gap-3">
                <!-- ปุ่มเล่น / พัก -->
                <button id="playPauseBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-2xl py-4 text-lg font-bold shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2">
                    <span id="playPauseIcon">▶️</span>
                    <span id="playPauseText">เริ่มอ่านข้อความ</span>
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <!-- ปุ่มหยุด -->
                    <button id="stopBtn" class="bg-slate-800/50 hover:bg-red-900/20 text-red-500 rounded-2xl py-3 font-bold transition-all border border-slate-800">
                        ⏹️ หยุดอ่าน
                    </button>
                    <!-- ปุ่มล้างจอ -->
                    <button id="clearBtn" class="bg-slate-800/50 hover:bg-slate-700 text-slate-400 rounded-2xl py-3 font-bold transition-all border border-slate-800">
                        🗑️ ล้างจอ
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-2 shrink-0 text-[10px] text-slate-700 font-medium uppercase tracking-widest">
        TheMuiz × Mali Assistant
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const speechText = document.getElementById('speechText');
            const displayArea = document.getElementById('displayArea');
            const modeLabel = document.getElementById('modeLabel');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playPauseIcon = document.getElementById('playPauseIcon');
            const playPauseText = document.getElementById('playPauseText');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusMessage = document.getElementById('statusMessage');
            const speedSlider = document.getElementById('speedSlider');
            const speedValue = document.getElementById('speedValue');

            let isPlaying = false; 
            let isPaused = false;
            let currentWordIndex = 0;
            let wordsArray = [];
            let highlightInterval = null;

            speedSlider.addEventListener('input', () => {
                speedValue.textContent = speedSlider.value + 'x';
            });

            // ฟังก์ชันเตรียมข้อความสำหรับการไฮไลท์
            function prepareHighlight(text) {
                // แยกคำเบื้องต้น (พยายามแยกตามช่องว่างหรือเครื่องหมาย)
                const rawWords = text.split(/(\s+)/);
                displayArea.innerHTML = '';
                wordsArray = [];

                rawWords.forEach((item) => {
                    const span = document.createElement('span');
                    span.className = 'word';
                    span.textContent = item;
                    displayArea.appendChild(span);
                    // เก็บเฉพาะตัวหนังสือที่ไม่ใช่ช่องว่างเข้า Array สำหรับนับตำแหน่งอ่าน
                    if (item.trim() !== '') {
                        wordsArray.push(span);
                    }
                });
            }

            // ฟังก์ชันอัปเดตตำแหน่งไฮไลท์
            function startHighlighting() {
                if (highlightInterval) clearInterval(highlightInterval);

                // ประมาณการเวลาในการอ่านแต่ละคำ (อิงจากความเร็ว)
                // เนื่องจาก ResponsiveVoice API ตัวฟรีไม่มี callback ตำแหน่งคำที่แม่นยำ 
                // เราจึงต้องใช้ Logic คำนวณความเร็วสัมพันธ์กับความยาวคำ
                const baseSpeed = 150; // ความเร็วพื้นฐาน ms ต่อตัวอักษร
                const rate = parseFloat(speedSlider.value);

                function moveHighlight() {
                    if (currentWordIndex < wordsArray.length) {
                        // ลบสถานะคำเก่า
                        if (currentWordIndex > 0) {
                            wordsArray[currentWordIndex - 1].classList.remove('active');
                            wordsArray[currentWordIndex - 1].classList.add('passed');
                        }
                        
                        // ใส่สถานะคำปัจจุบัน
                        const activeWord = wordsArray[currentWordIndex];
                        activeWord.classList.add('active');
                        activeWord.scrollIntoView({ behavior: 'smooth', block: 'center' });

                        // คำนวณเวลาเพื่อรอคำถัดไป
                        const wordLength = activeWord.textContent.length;
                        const duration = (wordLength * baseSpeed) / rate;

                        currentWordIndex++;
                        highlightInterval = setTimeout(moveHighlight, duration);
                    }
                }
                
                moveHighlight();
            }

            function updateUI(state) {
                if (state === 'playing') {
                    playPauseIcon.textContent = '⏸️';
                    playPauseText.textContent = 'พักเสียงชั่วคราว';
                    playPauseBtn.className = "w-full bg-amber-600 text-white rounded-2xl py-4 text-lg font-bold shadow-lg transition-all flex items-center justify-center gap-2";
                    statusMessage.textContent = 'กำลังอ่านและไฮไลท์อยู่นะจ๊ะ...';
                    speechText.classList.add('hidden');
                    displayArea.classList.remove('hidden');
                    modeLabel.textContent = 'โหมดไฮไลท์';
                } else if (state === 'paused') {
                    playPauseIcon.textContent = '▶️';
                    playPauseText.textContent = 'อ่านต่อจากเดิม';
                    playPauseBtn.className = "w-full bg-emerald-600 text-white rounded-2xl py-4 text-lg font-bold shadow-lg transition-all flex items-center justify-center gap-2";
                    statusMessage.textContent = 'พักเสียงไว้แป๊บนึงจ้า';
                } else {
                    playPauseIcon.textContent = '▶️';
                    playPauseText.textContent = 'เริ่มอ่านข้อความ';
                    playPauseBtn.className = "w-full bg-blue-600 text-white rounded-2xl py-4 text-lg font-bold shadow-lg transition-all flex items-center justify-center gap-2";
                    statusMessage.textContent = 'เตงพร้อมแล้วกดเริ่มได้เลยนะจ๊ะ';
                    speechText.classList.remove('hidden');
                    displayArea.classList.add('hidden');
                    modeLabel.textContent = 'โหมดพิมพ์';
                }
            }

            playPauseBtn.addEventListener('click', () => {
                if (typeof responsiveVoice === 'undefined') return;

                if (isPlaying && !isPaused) {
                    responsiveVoice.pause();
                    clearTimeout(highlightInterval);
                    isPaused = true;
                    updateUI('paused');
                    return;
                }

                if (isPlaying && isPaused) {
                    responsiveVoice.resume();
                    isPaused = false;
                    updateUI('playing');
                    startHighlighting(); // อ่านต่อจากจุดเดิม
                    return;
                }

                const text = speechText.value.trim();
                if (!text) {
                    statusMessage.textContent = 'อย่าลืมพิมพ์ข้อความให้มะลิก่อนน้า';
                    return;
                }

                responsiveVoice.cancel();
                clearTimeout(highlightInterval);
                
                // เตรียมระบบไฮไลท์
                prepareHighlight(text);
                currentWordIndex = 0;
                
                isPlaying = true;
                isPaused = false;
                updateUI('playing');
                startHighlighting();

                responsiveVoice.speak(text, 'Thai Female', {
                    rate: speedSlider.value,
                    onend: () => {
                        isPlaying = false;
                        isPaused = false;
                        clearTimeout(highlightInterval);
                        updateUI('default');
                        statusMessage.textContent = 'อ่านจบเรียบร้อยแล้วจ้า';
                    }
                });
            });

            stopBtn.addEventListener('click', () => {
                responsiveVoice.cancel();
                clearTimeout(highlightInterval);
                isPlaying = false;
                isPaused = false;
                updateUI('default');
            });

            clearBtn.addEventListener('click', () => {
                responsiveVoice.cancel();
                clearTimeout(highlightInterval);
                speechText.value = '';
                isPlaying = false;
                isPaused = false;
                updateUI('default');
            });
        });
    </script>
</body>
</html>

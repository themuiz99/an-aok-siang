```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheMuiz อ่านออกเสียง</title>
    <!-- Load Tailwind CSS for styling and responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Scripts for ResponsiveVoice with different API keys -->
    <!-- API ตัวเดิม (เสียงผู้หญิง) -->
    <script id="voice-female" src="https://code.responsivevoice.org/responsivevoice.js?key=Negu9VLC"></script>
    <!-- API ตัวใหม่ที่ส่งมา (เสียงผู้ชาย) -->
    <script id="voice-male" src="https://code.responsivevoice.org/responsivevoice.js?key=6uRDqcc4"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
            overflow: hidden;
        }
        #statusMessage {
            min-height: 1.5rem;
        }
        #speechText {
            max-height: 40vh;
            overflow-y: auto;
            flex-grow: 1;
        }
        .main-content-area {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 28rem;
        }
        .voice-option.active {
            border-color: #3b82f6;
            background-color: #1e3a8a;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <header class="text-center mb-4 mt-4">
        <h1 class="text-5xl font-extrabold text-white mb-2">TheMuiz</h1>
        <h2 class="text-3xl font-semibold text-white">อ่านออกเสียง</h2>
    </header>

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full main-content-area">
        <textarea
            id="speechText"
            class="w-full p-4 mb-4 bg-gray-700 text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
            rows="6"
            placeholder="พิมพ์ข้อความที่นี่เลยค่ะ..."
        ></textarea>

        <div class="w-full mb-6">
            <p class="text-sm text-gray-400 mb-2 text-center">เลือกเสียงที่ต้องการ:</p>
            <div class="flex space-x-2">
                <button 
                    id="selectFemale" 
                    class="voice-option active flex-1 py-2 px-4 rounded-lg border border-gray-600 bg-gray-700 text-sm transition-all duration-200"
                >
                    👩 เสียงผู้หญิง
                </button>
                <button 
                    id="selectMale" 
                    class="voice-option flex-1 py-2 px-4 rounded-lg border border-gray-600 bg-gray-700 text-sm transition-all duration-200"
                >
                    👨 เสียงผู้ชาย
                </button>
            </div>
        </div>

        <p id="statusMessage" class="text-center text-gray-400 mb-6 text-sm"></p>

        <div class="flex flex-col space-y-4 w-full">
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 w-full">
                <button
                    id="speakButton"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    อ่านออกเสียงเลย!
                </button>
                <button
                    id="pauseButton"
                    class="flex-1 bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                >
                    หยุดพัก/อ่านต่อ
                </button>
            </div>
            <button
                id="clearButton"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500"
            >
                ล้างข้อความ
            </button>
        </div>
    </div>

    <footer class="mt-4 mb-4 text-gray-500 text-sm">
        Creator: TheMuiz × หนูมะลิ
    </footer>

    <script>
        function filterTextToSpeak(text) {
            return text.replace(/[^ก-๙a-zA-Z0-9\s\n]/g, '');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const speechText = document.getElementById('speechText');
            const speakButton = document.getElementById('speakButton');
            const pauseButton = document.getElementById('pauseButton');
            const clearButton = document.getElementById('clearButton');
            const statusMessage = document.getElementById('statusMessage');
            const btnFemale = document.getElementById('selectFemale');
            const btnMale = document.getElementById('selectMale');
            
            let selectedVoice = 'Thai Female';
            let isPaused = false;
            let currentTextArray = [];
            let currentIndex = 0;

            btnFemale.addEventListener('click', () => {
                selectedVoice = 'Thai Female';
                btnFemale.classList.add('active');
                btnMale.classList.remove('active');
                statusMessage.textContent = 'เลือกโหมดเสียงผู้หญิงแล้วค่ะ';
                stopSpeaking();
            });

            btnMale.addEventListener('click', () => {
                selectedVoice = 'Thai Male';
                btnMale.classList.add('active');
                btnFemale.classList.remove('active');
                statusMessage.textContent = 'เลือกโหมดเสียงผู้ชายแล้วค่ะ';
                stopSpeaking();
            });

            function stopSpeaking() {
                if (typeof responsiveVoice !== 'undefined') {
                    responsiveVoice.cancel();
                }
                isPaused = false;
                currentIndex = 0;
            }

            function playFromIndex(index) {
                if (index >= currentTextArray.length) {
                    statusMessage.textContent = 'อ่านจบแล้วค่ะ!';
                    isPaused = false;
                    currentIndex = 0;
                    return;
                }

                currentIndex = index;
                const partToSpeak = currentTextArray[currentIndex];
                
                responsiveVoice.speak(partToSpeak, selectedVoice, {
                    onend: () => {
                        if (!isPaused) {
                            playFromIndex(currentIndex + 1);
                        }
                    }
                });
            }

            speakButton.addEventListener('click', () => {
                if (typeof responsiveVoice === 'undefined') {
                    statusMessage.textContent = 'ระบบยังไม่พร้อมใช้งานค่ะ';
                    return;
                }

                const rawText = speechText.value.trim();
                if (!rawText) {
                    statusMessage.textContent = 'กรุณาพิมพ์ข้อความก่อนนะจ๊ะ!';
                    return;
                }

                const filteredText = filterTextToSpeak(rawText);
                // แยกข้อความออกเป็นส่วนๆ ตามประโยคหรือช่องว่างเพื่อให้หยุดพักได้แม่นยำขึ้น
                currentTextArray = filteredText.split(/([。！？.!?\n])/).filter(s => s.trim().length > 0);
                
                if (currentTextArray.length === 0) {
                    currentTextArray = [filteredText];
                }

                stopSpeaking();
                statusMessage.textContent = `กำลังเริ่มอ่านด้วย${selectedVoice === 'Thai Female' ? 'เสียงผู้หญิง' : 'เสียงผู้ชาย'}...`;
                playFromIndex(0);
            });

            pauseButton.addEventListener('click', () => {
                if (typeof responsiveVoice === 'undefined' || currentTextArray.length === 0) return;

                if (responsiveVoice.isPlaying()) {
                    // ใช้ cancel เพื่อให้หยุดทันที ไม่ไหลต่อ
                    responsiveVoice.cancel();
                    isPaused = true;
                    statusMessage.textContent = 'หยุดพักแล้วค่ะ';
                } else if (isPaused) {
                    isPaused = false;
                    statusMessage.textContent = 'กำลังอ่านต่อค่ะ...';
                    playFromIndex(currentIndex);
                }
            });

            clearButton.addEventListener('click', () => {
                stopSpeaking();
                speechText.value = '';
                statusMessage.textContent = 'ล้างข้อความเรียบร้อยค่ะ';
            });
        });
    </script>
</body>
</html>
